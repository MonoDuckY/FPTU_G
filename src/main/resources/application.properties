spring.application.name=FPTU_G

server.port=8080

# C?u hšnh Database linh ho?t (Magic happens here ?)
# Cº phÃp ${BI?N:m?c_??nh} ngh?a lÁ: N?u trõn m¶i tr??ng (Render) cµ khai bÃo BI?N nÁy thš dªng,
# c·n n?u ch?y trõn mÃy tÚnh cÃ nhãn (kh¶ng cµ BI?N) thš s? t? ??ng dªng giÃ tr? ??ng sau d?u hai ch?m.
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:fptu_g_db}?useUnicode=true&characterEncoding=UTF-8&useSSL=${DB_SSL:false}
spring.datasource.username=${DB_USERNAME:root}
